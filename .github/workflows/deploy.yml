name: CI/CD Self-Hosted Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: your-dockerhub-username/your-app-name

jobs:
  # ── JOB 1: CI - Chạy trực tiếp trên máy ảo Debian ───────
  ci:
    name: Build & Test
    runs-on: self-hosted # <--- Chỉ định chạy trên máy ảo VMware của bạn
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── JOB 2: Build & Push Docker Image ─────────────────────
  build-image:
    name: Build Docker Image
    needs: ci
    runs-on: self-hosted
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  # ── JOB 3: CD - Deploy trực tiếp (Không dùng SSH) ────────
  deploy:
    name: Deploy to Local VM
    needs: build-image
    runs-on: self-hosted
    steps:
      - name: Local Docker Deployment
        run: |
          # Vì Runner đang chạy trên chính máy này, ta gõ lệnh như đang ngồi terminal
          docker pull ${{ env.IMAGE_NAME }}:latest
          
          docker stop my-app || true
          docker rm my-app || true
          
          docker run -d \
            --name my-app \
            --restart unless-stopped \
            -p 3000:3000 \
            ${{ env.IMAGE_NAME }}:latest
            
          docker image prune -f
          echo "Đã deploy xong trên máy ảo VMware!"
